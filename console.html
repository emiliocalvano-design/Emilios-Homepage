<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Console</title>
<style>
  :root { --ink:#222; --muted:#888; --line:#e6e6e6; --up:#1a7f37; --down:#b42318; --bg:#fafafa; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Raleway','Helvetica Neue',Arial,sans-serif; font-weight:300;
         color:var(--ink); background:var(--bg); }
  .bar { background:#111; color:#fff; padding:12px 22px; display:flex; align-items:center; gap:14px; }
  .bar h1 { font-size:16px; font-weight:500; margin:0; letter-spacing:.4px; }
  .bar .dot { width:8px; height:8px; border-radius:50%; background:#3fb950; }
  .bar .right { margin-left:auto; font-size:12px; color:#aaa; }
  .wrap { max-width:1040px; margin:0 auto; padding:26px 22px 80px; }

  /* login */
  .gate { max-width:360px; margin:80px auto; background:#fff; border:1px solid var(--line);
          border-radius:10px; padding:28px; text-align:center; }
  .gate h2 { font-weight:300; margin:0 0 6px; }
  .gate p { color:var(--muted); font-size:13px; margin:0 0 18px; }
  .gate input { width:100%; padding:11px 13px; border:1px solid #ccc; border-radius:7px; font-size:15px; }
  .gate button, .reload { margin-top:14px; width:100%; padding:11px; border:0; border-radius:7px;
          background:#111; color:#fff; font-size:14px; cursor:pointer; }
  .err { color:var(--down); font-size:13px; min-height:18px; margin-top:8px; }

  .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin:6px 0 30px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:18px 20px; }
  .card .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.6px; }
  .card .big { font-size:34px; font-weight:300; margin:6px 0 2px; }
  .card .sub { font-size:12px; color:var(--muted); }
  .trend { font-size:13px; font-weight:500; }
  .trend.up { color:var(--up); } .trend.down { color:var(--down); } .trend.flat { color:var(--muted); }

  .panel { background:#fff; border:1px solid var(--line); border-radius:10px; padding:18px 20px; margin-bottom:26px; }
  .panel h3 { font-weight:400; margin:0 0 12px; font-size:15px; }
  .meta { color:var(--muted); font-size:12px; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
  th { color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  td.ip { font-family:ui-monospace,Menlo,monospace; }
  .pill { display:inline-block; background:#f1f1f1; border-radius:5px; padding:1px 7px; font-size:12px; }
  .hidden { display:none; }
  @media (max-width:680px){ .cards{ grid-template-columns:1fr; } td.ua{ display:none; } }
</style>
</head>
<body>

<div id="gate" class="gate">
  <h2>Console</h2>
  <p>Enter access token</p>
  <input id="token" type="password" autocomplete="off" placeholder="token" />
  <button id="enter">Unlock</button>
  <div id="err" class="err"></div>
</div>

<div id="app" class="hidden">
  <div class="bar">
    <span class="dot"></span><h1>Visitor Console</h1>
    <span class="right" id="genat"></span>
  </div>
  <div class="wrap">
    <div class="cards" id="cards"></div>

    <div class="panel">
      <h3>Daily visits — last 90 days</h3>
      <div id="spark"></div>
    </div>

    <div class="panel">
      <h3>Recent visits <span class="meta" id="recmeta"></span></h3>
      <div style="overflow-x:auto">
        <table id="rec">
          <thead><tr>
            <th>When</th><th>IP</th><th>Location</th><th>Org / network</th><th>Page</th><th class="ua">Referrer</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <button class="reload" id="reload" style="max-width:160px">Refresh</button>
  </div>
</div>

<script src="assets/analytics-config.js"></script>
<script>
(function () {
  var API = window.ANALYTICS_API;
  var gate = document.getElementById('gate'), app = document.getElementById('app');
  var err = document.getElementById('err');

  function timeAgo(ts){
    var s = Math.floor((Date.now()-ts)/1000);
    if (s<60) return s+'s ago';
    if (s<3600) return Math.floor(s/60)+'m ago';
    if (s<86400) return Math.floor(s/3600)+'h ago';
    return Math.floor(s/86400)+'d ago';
  }
  function esc(x){ return (x==null?'':String(x)).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  function trendHtml(pct){
    if (pct > 0) return '<span class="trend up">▲ '+pct+'%</span>';
    if (pct < 0) return '<span class="trend down">▼ '+Math.abs(pct)+'%</span>';
    return '<span class="trend flat">— 0%</span>';
  }

  function card(w, title){
    return '<div class="card"><div class="label">'+title+'</div>'+
      '<div class="big">'+w.hits.toLocaleString()+'</div>'+
      '<div class="sub">'+w.uniqueIps.toLocaleString()+' unique IPs · '+
      trendHtml(w.changePct)+' vs prior '+w.days+'d</div></div>';
  }

  function sparkline(series){
    var W=1000, H=90, n=series.length, max=Math.max(1, Math.max.apply(null, series));
    var step = W/(n-1);
    var pts = series.map(function(v,i){ return [i*step, H - (v/max)*(H-8) - 4]; });
    var line = pts.map(function(p,i){ return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1); }).join(' ');
    var area = 'M0 '+H+' ' + pts.map(function(p){ return 'L'+p[0].toFixed(1)+' '+p[1].toFixed(1); }).join(' ') + ' L'+W+' '+H+' Z';
    return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:90px;display:block">'+
      '<path d="'+area+'" fill="#11111108"/>'+
      '<path d="'+line+'" fill="none" stroke="#111" stroke-width="2"/></svg>'+
      '<div class="meta" style="display:flex;justify-content:space-between;margin-top:4px">'+
      '<span>90 days ago</span><span>peak '+max+'/day</span><span>today</span></div>';
  }

  function render(d){
    document.getElementById('genat').textContent =
      'updated ' + new Date(d.generatedAt).toLocaleString() + ' · ' + d.totalLogged + ' rows';
    document.getElementById('cards').innerHTML =
      card(d.windows.d30,'Last 30 days') + card(d.windows.d60,'Last 60 days') + card(d.windows.d90,'Last 90 days');
    document.getElementById('spark').innerHTML = sparkline(d.series90);
    var tb = document.querySelector('#rec tbody');
    document.getElementById('recmeta').textContent = '(' + d.recent.length + ' most recent)';
    tb.innerHTML = d.recent.map(function(r){
      return '<tr><td>'+timeAgo(r.ts)+'</td><td class="ip">'+esc(r.ip)+'</td>'+
        '<td>'+esc(r.loc||'—')+'</td><td>'+(r.org?'<span class="pill">'+esc(r.org)+'</span>':'—')+'</td>'+
        '<td>'+esc(r.path||'—')+'</td><td class="ua">'+esc(r.referrer||'—')+'</td></tr>';
    }).join('') || '<tr><td colspan="6" class="meta">No visits logged yet.</td></tr>';
  }

  function load(token){
    err.textContent = 'Loading…';
    fetch(API + '/stats?token=' + encodeURIComponent(token))
      .then(function(res){
        if (res.status === 401) throw new Error('Invalid token');
        if (!res.ok) throw new Error('Error ' + res.status);
        return res.json();
      })
      .then(function(d){
        sessionStorage.setItem('dash_token', token);
        gate.classList.add('hidden'); app.classList.remove('hidden');
        err.textContent = '';
        render(d);
      })
      .catch(function(e){
        err.textContent = e.message;
        gate.classList.remove('hidden'); app.classList.add('hidden');
      });
  }

  function attempt(){
    if (!API || API.indexOf('REPLACE-WITH') !== -1){
      err.textContent = 'Worker URL not configured (assets/analytics-config.js).';
      return;
    }
    var t = document.getElementById('token').value.trim();
    if (t) load(t);
  }

  document.getElementById('enter').addEventListener('click', attempt);
  document.getElementById('token').addEventListener('keydown', function(e){ if (e.key==='Enter') attempt(); });
  document.getElementById('reload').addEventListener('click', function(){
    load(sessionStorage.getItem('dash_token'));
  });

  var saved = sessionStorage.getItem('dash_token');
  if (saved) load(saved);
})();
</script>
</body>
</html>
